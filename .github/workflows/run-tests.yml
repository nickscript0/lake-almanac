name: Test runner

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  testing_job:
    runs-on: ubuntu-latest
    env:
      TZ: UTC
    steps:
      - name: Check out repo
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
